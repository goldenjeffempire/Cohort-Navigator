components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    UserRole:
      type: string
      enum: [student, mentor, admin]

    CohortStatus:
      type: string
      enum: [upcoming, active, completed]

    EnrollmentStatus:
      type: string
      enum: [active, graduated, dropped]

    SubmissionStatus:
      type: string
      enum: [submitted, graded, late]

    AttemptStatus:
      type: string
      enum: [in_progress, completed]

    ScholarshipStatus:
      type: string
      enum: [pending, approved, rejected]

    User:
      type: object
      required: [id, clerkId, email, name, role, createdAt]
      properties:
        id: { type: integer }
        clerkId: { type: string }
        email: { type: string }
        name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        avatarUrl: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
    UserUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        bio: { type: string }
        avatarUrl: { type: string }
    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role: { $ref: "#/components/schemas/UserRole" }

    Cohort:
      type: object
      required: [id, name, startDate, status, studentCount, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        startDate: { type: string, format: date }
        endDate: { type: ["string", "null"], format: date }
        status: { $ref: "#/components/schemas/CohortStatus" }
        capacity: { type: ["integer", "null"] }
        studentCount: { type: integer }
        createdAt: { type: string, format: date-time }
    CohortInput:
      type: object
      required: [name, startDate]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { $ref: "#/components/schemas/CohortStatus" }
        capacity: { type: integer }
    CohortUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { $ref: "#/components/schemas/CohortStatus" }
        capacity: { type: integer }

    CohortEnrollment:
      type: object
      required: [id, cohortId, studentId, studentName, studentEmail, status, enrolledAt]
      properties:
        id: { type: integer }
        cohortId: { type: integer }
        studentId: { type: integer }
        studentName: { type: string }
        studentEmail: { type: string }
        status: { $ref: "#/components/schemas/EnrollmentStatus" }
        enrolledAt: { type: string, format: date-time }
    EnrollmentInput:
      type: object
      required: [studentId]
      properties:
        studentId: { type: integer }
    EnrollmentUpdate:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/EnrollmentStatus" }

    MentorCohort:
      type: object
      required: [id, cohortId, mentorId, mentorName, mentorEmail, assignedAt]
      properties:
        id: { type: integer }
        cohortId: { type: integer }
        mentorId: { type: integer }
        mentorName: { type: string }
        mentorEmail: { type: string }
        assignedAt: { type: string, format: date-time }
    MentorAssignmentInput:
      type: object
      required: [mentorId]
      properties:
        mentorId: { type: integer }

    CohortCourse:
      type: object
      required: [id, cohortId, courseId, courseTitle, order, addedAt]
      properties:
        id: { type: integer }
        cohortId: { type: integer }
        courseId: { type: integer }
        courseTitle: { type: string }
        order: { type: integer }
        addedAt: { type: string, format: date-time }
    CohortCourseInput:
      type: object
      required: [courseId]
      properties:
        courseId: { type: integer }
        order: { type: integer, default: 0 }

    Course:
      type: object
      required: [id, title, moduleCount, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        thumbnailUrl: { type: ["string", "null"] }
        moduleCount: { type: integer }
        createdAt: { type: string, format: date-time }
    CourseInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        thumbnailUrl: { type: string }
    CourseUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        thumbnailUrl: { type: string }

    Module:
      type: object
      required: [id, courseId, title, order, lessonCount, createdAt]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        title: { type: string }
        order: { type: integer }
        lessonCount: { type: integer }
        createdAt: { type: string, format: date-time }
    ModuleInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        order: { type: integer, default: 0 }
    ModuleUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        order: { type: integer }

    Lesson:
      type: object
      required: [id, moduleId, title, order, createdAt, completed, bookmarked]
      properties:
        id: { type: integer }
        moduleId: { type: integer }
        title: { type: string }
        content: { type: ["string", "null"] }
        videoUrl: { type: ["string", "null"] }
        order: { type: integer }
        completed: { type: boolean }
        bookmarked: { type: boolean }
        createdAt: { type: string, format: date-time }
    LessonInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        videoUrl: { type: string }
        order: { type: integer, default: 0 }
    LessonUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        videoUrl: { type: string }
        order: { type: integer }

    LessonResource:
      type: object
      required: [id, lessonId, title, fileUrl, createdAt]
      properties:
        id: { type: integer }
        lessonId: { type: integer }
        title: { type: string }
        fileUrl: { type: string }
        fileType: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
    LessonResourceInput:
      type: object
      required: [title, fileUrl]
      properties:
        title: { type: string, minLength: 1 }
        fileUrl: { type: string }
        fileType: { type: string }

    LessonProgress:
      type: object
      required: [id, lessonId, studentId, completed, lastAccessedAt]
      properties:
        id: { type: integer }
        lessonId: { type: integer }
        studentId: { type: integer }
        completed: { type: boolean }
        completedAt: { type: ["string", "null"], format: date-time }
        lastAccessedAt: { type: string, format: date-time }
    LessonProgressInput:
      type: object
      required: [completed]
      properties:
        completed: { type: boolean }

    BookmarkState:
      type: object
      required: [lessonId, bookmarked]
      properties:
        lessonId: { type: integer }
        bookmarked: { type: boolean }

    ContinueLearning:
      type: object
      properties:
        lessonId: { type: ["integer", "null"] }
        lessonTitle: { type: ["string", "null"] }
        moduleId: { type: ["integer", "null"] }
        courseId: { type: ["integer", "null"] }
        courseTitle: { type: ["string", "null"] }

    Assignment:
      type: object
      required: [id, courseId, title, maxScore, createdAt]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        moduleId: { type: ["integer", "null"] }
        title: { type: string }
        description: { type: ["string", "null"] }
        dueDate: { type: ["string", "null"], format: date-time }
        maxScore: { type: integer }
        mySubmissionStatus: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
    AssignmentInput:
      type: object
      required: [courseId, title]
      properties:
        courseId: { type: integer }
        moduleId: { type: integer }
        title: { type: string, minLength: 1 }
        description: { type: string }
        dueDate: { type: string, format: date-time }
        maxScore: { type: integer, default: 100 }
    AssignmentUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        dueDate: { type: string, format: date-time }
        maxScore: { type: integer }

    Submission:
      type: object
      required: [id, assignmentId, studentId, studentName, status, submittedAt]
      properties:
        id: { type: integer }
        assignmentId: { type: integer }
        studentId: { type: integer }
        studentName: { type: string }
        fileUrl: { type: ["string", "null"] }
        comment: { type: ["string", "null"] }
        status: { $ref: "#/components/schemas/SubmissionStatus" }
        score: { type: ["integer", "null"] }
        feedback: { type: ["string", "null"] }
        submittedAt: { type: string, format: date-time }
        gradedAt: { type: ["string", "null"], format: date-time }
    SubmissionInput:
      type: object
      properties:
        fileUrl: { type: string }
        comment: { type: string }
    SubmissionGradeInput:
      type: object
      required: [score]
      properties:
        score: { type: integer }
        feedback: { type: string }

    Quiz:
      type: object
      required: [id, courseId, title, questionCount, createdAt]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        moduleId: { type: ["integer", "null"] }
        title: { type: string }
        description: { type: ["string", "null"] }
